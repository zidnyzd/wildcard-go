{{define "content"}}
<div class="row">
    <div class="col-md-8 col-12">
        <div class="card mb-4">
            <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="mb-0">Cloudflare Credentials</h5>
                <small class="text-muted float-end">Tersimpan di database</small>
            </div>
            <div class="card-body">
                <form id="form-credentials" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label" for="api_token">API Token</label>
                        <input type="password" class="form-control" id="api_token" name="api_token" placeholder="Masukkan API Token Cloudflare" value="{{.ApiToken}}" required>
                        <div class="form-text">Profile - API Tokens - Create Custom Token (Zone:DNS:Edit, Zone:SSL:Edit)</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="zone_id">Zone ID</label>
                        <input type="text" class="form-control" id="zone_id" name="zone_id" placeholder="Masukkan Zone ID domain" value="{{.ZoneID}}" required>
                        <div class="form-text">Dashboard domain - scroll kanan bawah - Zone ID</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="domain">Domain</label>
                        <input type="text" class="form-control" id="domain" name="domain" placeholder="contoh: domain-anda.my.id" value="{{.Domain}}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="vps_ip">IP VPS</label>
                        <input type="text" class="form-control" id="vps_ip" name="vps_ip" placeholder="contoh: 192.168.1.1" value="{{.VpsIP}}" required>
                    </div>
                    <hr class="my-4">
                    <h6 class="mb-3">SSH Credentials (Opsional)</h6>
                    <p class="text-muted small mb-3">Diperlukan jika ingin upload ACME challenge file ke VPS otomatis.</p>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label" for="ssh_host">SSH Host / IP</label>
                            <input type="text" class="form-control" id="ssh_host" name="ssh_host" placeholder="Sama dengan IP VPS" value="{{.SSHHost}}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label" for="ssh_port">SSH Port</label>
                            <input type="number" class="form-control" id="ssh_port" name="ssh_port" value="{{.SSHPort}}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="ssh_user">SSH User</label>
                            <input type="text" class="form-control" id="ssh_user" name="ssh_user" value="{{.SSHUser}}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="ssh_password">SSH Password</label>
                            <input type="password" class="form-control" id="ssh_password" name="ssh_password" value="{{.SSHPassword}}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bx bx-save me-1"></i> Save &amp; Verify</button>
                </form>
                <div id="cred-result" class="mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>
{{end}}
