{{define "content"}}
<div class="row">
    <div class="col-md-8 col-12">
        <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0">Setup Fallback Origin + DNS</h5></div>
            <div class="card-body">
                <p class="text-muted">Buat DNS record (A fallback + A wildcard) dan set fallback origin di Cloudflare.</p>
                <button id="btn-setup-fallback" class="btn btn-warning"><i class="bx bx-rocket me-1"></i> Jalankan Setup Fallback</button>
                <div id="fallback-log" class="log-container mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>
{{end}}
