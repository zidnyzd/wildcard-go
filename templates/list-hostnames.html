{{define "content"}}
<div class="row">
    <div class="col-12">
        <div class="card mb-4">
            <div class="card-header d-flex align-items-center justify-content-between">
                <h5 class="mb-0">List Custom Hostnames</h5>
                <button id="btn-refresh-hostnames" class="btn btn-sm btn-secondary"><i class="bx bx-refresh me-1"></i> Refresh</button>
            </div>
            <div class="card-body">
                <div id="hostnames-list" class="table-responsive text-nowrap"><p class="text-muted">Klik Refresh untuk memuat daftar hostname.</p></div>
            </div>
        </div>
    </div>
</div>
{{end}}
